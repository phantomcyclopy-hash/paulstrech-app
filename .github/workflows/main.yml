name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies and Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Build APK (Silent Mode)
      env:
        CI: "true"
        FLET_CI: "1"
        FLET_ANALYTICS_OPTOUT: "1"
        PUB_ENVIRONMENT: "bot.github_actions"
      run: |
        flet build apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: paulstretch-apk
        path: build/apk/*.apk

    - name: Build APK
      run: |
        flet build apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: paulstretch-apk
        path: build/apk/*.apk
