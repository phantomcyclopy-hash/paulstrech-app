name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.22.0

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Build APK (Lightweight Mode)
      env:
        CI: "true"
        FLET_CI: "1"
        FLET_ANALYTICS_OPTOUT: "1"
        PUB_ENVIRONMENT: "bot.github_actions"
      run: |
        flet build apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: paulstretch-apk
        path: build/apk/*.apk
