name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install flet==0.22.0

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Pre-install Android Mobile Binaries
      run: |
        # Criamos a pasta onde o Flet guarda os pacotes do app
        mkdir -p __pypackages__/3.11/lib/python3.11/site-packages
        
        # Descarregamos os binários prontos (wheels) sem compilar absolutamente nada
        pip download --only-binary=:all: --platform manylinux2014_aarch64 --implementation cp --python-version 3.11 --dest /tmp/wheels numpy scipy
        
        # Instalamos os pacotes diretamente na estrutura de pastas do projeto
        pip install --target __pypackages__/3.11/lib/python3.11/site-packages --no-index --find-links=/tmp/wheels numpy scipy

    - name: Build APK (Automated Mode)
      env:
        CI: "true"
        FLET_CI: "1"
        FLET_NON_INTERACTIVE: "true"
        FLET_ANALYTICS_OPTOUT: "1"
        PUB_ENVIRONMENT: "bot.github_actions"
      run: |
        flet build apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: paulstretch-apk
        path: build/apk/*.apk
